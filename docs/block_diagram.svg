<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#333"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#0066cc"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">8-bit Fibonacci LFSR &#8212; tt_um_arielfayol37</text>
  <text x="460" y="48" text-anchor="middle" font-size="11" fill="#666">polynomial x&#8312; + x&#8310; + x&#8309; + x&#8308; + 1  &#183;  maximal-length sequence, period 255</text>

  <g font-family="monospace" font-size="12" fill="#0066cc">
    <text x="20" y="115">ui_in[7:0]</text>
    <text x="20" y="200">rst_n</text>
    <text x="20" y="248">clk</text>
  </g>

  <line x1="90" y1="110" x2="155" y2="110" stroke="#0066cc" stroke-width="2"/>
  <line x1="155" y1="110" x2="155" y2="80" stroke="#0066cc" stroke-width="2"/>
  <line x1="155" y1="80" x2="840" y2="80" stroke="#0066cc" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="500" y="73" text-anchor="middle" font-size="10" fill="#0066cc">parallel seed bus &#8212; loaded synchronously while rst_n = 0</text>

  <line x1="55" y1="195" x2="170" y2="195" stroke="#0066cc" stroke-width="2"/>
  <line x1="170" y1="195" x2="170" y2="115" stroke="#0066cc" stroke-width="2"/>
  <line x1="170" y1="115" x2="180" y2="115" stroke="#0066cc" stroke-width="2"/>
  <text x="178" y="208" font-size="10" fill="#0066cc">selects seed vs. shift</text>

  <line x1="40" y1="243" x2="840" y2="243" stroke="#0066cc" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="500" y="259" text-anchor="middle" font-size="10" fill="#0066cc">clock broadcast (50 MHz)</text>

  <g>
    <rect x="200" y="140" width="80" height="55" rx="4" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="240" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">b0</text>

    <rect x="285" y="140" width="80" height="55" rx="4" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="325" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">b1</text>

    <rect x="370" y="140" width="80" height="55" rx="4" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="410" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">b2</text>

    <rect x="455" y="140" width="80" height="55" rx="4" fill="#fff5f5" stroke="#c0392b" stroke-width="2"/>
    <text x="495" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">b3 *</text>

    <rect x="540" y="140" width="80" height="55" rx="4" fill="#fff5f5" stroke="#c0392b" stroke-width="2"/>
    <text x="580" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">b4 *</text>

    <rect x="625" y="140" width="80" height="55" rx="4" fill="#fff5f5" stroke="#c0392b" stroke-width="2"/>
    <text x="665" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">b5 *</text>

    <rect x="710" y="140" width="80" height="55" rx="4" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="750" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">b6</text>

    <rect x="795" y="140" width="80" height="55" rx="4" fill="#fff5f5" stroke="#c0392b" stroke-width="2"/>
    <text x="835" y="173" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">b7 *</text>
  </g>

  <g stroke="#888" stroke-width="1.5" fill="none">
    <line x1="280" y1="167" x2="285" y2="167" marker-end="url(#arr)"/>
    <line x1="365" y1="167" x2="370" y2="167" marker-end="url(#arr)"/>
    <line x1="450" y1="167" x2="455" y2="167" marker-end="url(#arr)"/>
    <line x1="535" y1="167" x2="540" y2="167" marker-end="url(#arr)"/>
    <line x1="620" y1="167" x2="625" y2="167" marker-end="url(#arr)"/>
    <line x1="705" y1="167" x2="710" y2="167" marker-end="url(#arr)"/>
    <line x1="790" y1="167" x2="795" y2="167" marker-end="url(#arr)"/>
  </g>

  <line x1="875" y1="167" x2="900" y2="167" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="775" y="125" font-family="monospace" font-size="12" fill="#0066cc">uo_out[7:0]</text>
  <line x1="240" y1="140" x2="240" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="240" y1="125" x2="775" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="325" y1="140" x2="325" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="410" y1="140" x2="410" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="495" y1="140" x2="495" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="580" y1="140" x2="580" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="665" y1="140" x2="665" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="750" y1="140" x2="750" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="835" y1="140" x2="835" y2="125" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="775" y1="125" x2="775" y2="167" stroke="#0066cc" stroke-width="2"/>
  <line x1="775" y1="167" x2="900" y2="167" stroke="#0066cc" stroke-width="2" marker-end="url(#arrBlue)"/>

  <g stroke="#c0392b" stroke-width="2" fill="none">
    <line x1="495" y1="195" x2="495" y2="295"/>
    <line x1="580" y1="195" x2="580" y2="295"/>
    <line x1="665" y1="195" x2="665" y2="295"/>
    <line x1="835" y1="195" x2="835" y2="295"/>
  </g>

  <line x1="180" y1="295" x2="835" y2="295" stroke="#c0392b" stroke-width="2"/>
  <g fill="#c0392b">
    <circle cx="495" cy="295" r="3.5"/>
    <circle cx="580" cy="295" r="3.5"/>
    <circle cx="665" cy="295" r="3.5"/>
    <circle cx="835" cy="295" r="3.5"/>
  </g>

  <line x1="180" y1="295" x2="180" y2="320" stroke="#c0392b" stroke-width="2"/>
  <circle cx="180" cy="345" r="22" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <text x="180" y="354" text-anchor="middle" font-size="22" font-weight="bold" fill="#c0392b">&#8853;</text>
  <text x="220" y="350" font-size="12" fill="#c0392b">XOR feedback = b7 &#8853; b5 &#8853; b4 &#8853; b3</text>
  <text x="220" y="368" font-size="10" fill="#888" font-style="italic">(taps marked with *)</text>

  <line x1="158" y1="345" x2="115" y2="345" stroke="#c0392b" stroke-width="2"/>
  <line x1="115" y1="345" x2="115" y2="167" stroke="#c0392b" stroke-width="2"/>
  <line x1="115" y1="167" x2="200" y2="167" stroke="#c0392b" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="125" y="160" font-size="10" fill="#c0392b">feedback bit</text>
</svg>
